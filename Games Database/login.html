<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GAMES DATABASE</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

    <header class="main-header">
        <div class="container">
            <h1><a href="index.html" style="color: var(--secondary-color); text-decoration: none;">GAMES DATABASE</a>
            </h1>
        </div>
    </header>

    <main>
        <section class="section-login">
            <div class="container login-container">
                <h2>Acessar Conta</h2>
                <form id="login-form">
                    <div class="input-group">
                        <label for="username">Nome de Usuário</label>
                        <input type="text" id="username" required placeholder="Digite seu nome ou nickname">
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" required placeholder="Digite sua senha">
                    </div>
                    <button type="submit" class="btn-login">Entrar</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 GAMES DATABASE - Projeto Front End - UTFPR Cornélio Procópio.</p>
        </div>
    </footer>

    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault(); 

            const username = document.getElementById('username').value;

            localStorage.setItem('loggedUser', username);

            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
